name: 'Install Windows Driver Kit (WDK)'
description: >
  Installs Windows SDK 22H2 + WDK 22H2 (10.0.22621.0) for driver builds.
  Both are required: the vcxproj uses WindowsTargetPlatformVersion=10.0.22621.0
  (MSB8036 fires if the Windows SDK is absent) and hardcodes the WDK km path
  C:\Program Files (x86)\Windows Kits\10\Include\10.0.22621.0\km
  Skips each installer if the required artifacts are already present.
  Exit code 1001/3010 from installers is treated as non-fatal.

runs:
  using: composite
  steps:
    - name: Install Windows SDK 22H2 (10.0.22621.0)
      shell: pwsh
      run: |
        # MSB8036 fires when MSBuild cannot find the Windows SDK at the version
        # declared in WindowsTargetPlatformVersion (10.0.22621.0 in vcxproj).
        # The Windows SDK and the WDK are separate installers.
        $sdkUcrtPath = "C:\Program Files (x86)\Windows Kits\10\Include\10.0.22621.0\ucrt"
        if (Test-Path $sdkUcrtPath) {
            Write-Host "[OK] Windows SDK 10.0.22621.0 already present — skipping" -ForegroundColor Green
            exit 0
        }
        Write-Host "📦 Downloading Windows SDK 22H2 (10.0.22621.0)..." -ForegroundColor Cyan
        # Windows 11 SDK 22H2 (10.0.22621.x) standalone installer
        $sdkUrl = "https://go.microsoft.com/fwlink/?linkid=2196241"
        $sdkInstaller = "$env:TEMP\winsdksetup.exe"
        Invoke-WebRequest -Uri $sdkUrl -OutFile $sdkInstaller -UseBasicParsing
        Write-Host "⚙️ Installing Windows SDK 22H2 (silent)..." -ForegroundColor Cyan
        $sdkLog = "$env:TEMP\winsdksetup.log"
        $proc = Start-Process -FilePath $sdkInstaller `
            -ArgumentList "/quiet /norestart /log `"$sdkLog`" /features OptionId.WindowsSoftwareDevelopmentKit" `
            -Wait -PassThru
        $acceptableCodes = @(0, 3010, 1001)
        if ($proc.ExitCode -notin $acceptableCodes) {
            Write-Host "[FAIL] Windows SDK installer exited $($proc.ExitCode)" -ForegroundColor Red
            if (Test-Path $sdkLog) { Get-Content $sdkLog -Tail 20 | ForEach-Object { Write-Host $_ } }
            exit $proc.ExitCode
        }
        Write-Host "[INFO] Windows SDK installer exited $($proc.ExitCode)" -ForegroundColor Yellow
        if (-not (Test-Path $sdkUcrtPath)) {
            Write-Host "[FAIL] Windows SDK ucrt headers not found after install: $sdkUcrtPath" -ForegroundColor Red
            exit 1
        }
        Write-Host "[OK] Windows SDK 10.0.22621.0 installed" -ForegroundColor Green

    - name: Install WDK 22H2 (10.0.22621.0)
      shell: pwsh
      run: |
        function Find-WdkTool([string]$Name) {
            Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter $Name `
                -ErrorAction SilentlyContinue | Select-Object -First 1
        }

        # Check specifically for 10.0.22621.0 headers (the version pinned in vcxproj)
        $requiredKmPath = "C:\Program Files (x86)\Windows Kits\10\Include\10.0.22621.0\km\ntddk.h"
        $inf2cat  = Find-WdkTool "inf2cat.exe"
        $signtool = Find-WdkTool "signtool.exe"

        if ($inf2cat -and $signtool -and (Test-Path $requiredKmPath)) {
            Write-Host "[OK] WDK 10.0.22621.0 already present — skipping install" -ForegroundColor Green
            Write-Host "  signtool : $($signtool.FullName)"
            Write-Host "  inf2cat  : $($inf2cat.FullName)"
            exit 0
        }

        # Always install WDK 22H2 (10.0.22621.0) — this is the version pinned in the vcxproj.
        # The vcxproj hardcodes: C:\Program Files (x86)\Windows Kits\10\Include\10.0.22621.0\km
        # Installing a different WDK version will NOT provide that path.
        Write-Host "📦 Downloading WDK 22H2 (10.0.22621.0)..." -ForegroundColor Cyan
        $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2196230"
        $wdkInstaller = "$env:TEMP\wdksetup.exe"
        Invoke-WebRequest -Uri $wdkUrl -OutFile $wdkInstaller -UseBasicParsing

        Write-Host "⚙️ Installing WDK 22H2 (silent)..." -ForegroundColor Cyan
        $wdkLog = "$env:TEMP\wdksetup.log"
        $proc = Start-Process -FilePath $wdkInstaller `
            -ArgumentList "/quiet /norestart /log `"$wdkLog`"" `
            -Wait -PassThru

        # 0    = success
        # 3010 = success, reboot required (safe — tools are usable without reboot)
        # 1001 = installer conflict; tools may already be present
        $acceptableCodes = @(0, 3010, 1001)
        if ($proc.ExitCode -notin $acceptableCodes) {
            Write-Host "[FAIL] WDK installer exited with unexpected code $($proc.ExitCode)" -ForegroundColor Red
            exit $proc.ExitCode
        }
        Write-Host "[INFO] WDK installer exited $($proc.ExitCode) — verifying..." -ForegroundColor Yellow
        if (Test-Path $wdkLog) {
            Write-Host "--- WDK install log (last 20 lines) ---" -ForegroundColor DarkGray
            Get-Content $wdkLog -Tail 20 | ForEach-Object { Write-Host $_ }
        }

        $inf2cat  = Find-WdkTool "inf2cat.exe"
        $signtool = Find-WdkTool "signtool.exe"

        if (-not (Test-Path $requiredKmPath)) {
            Write-Host "[FAIL] Required WDK headers not found after install: $requiredKmPath" -ForegroundColor Red
        }

        if (-not $inf2cat -or -not $signtool) {
            Write-Host "[FAIL] WDK tools not found after all install attempts" -ForegroundColor Red
            Write-Host "  signtool : $(if($signtool){'found: '+$signtool.FullName}else{'NOT FOUND'})"
            Write-Host "  inf2cat  : $(if($inf2cat){'found: '+$inf2cat.FullName}else{'NOT FOUND'})"
            Write-Host "--- EXE files under Windows Kits 10 bin (for diagnosis) ---" -ForegroundColor DarkGray
            Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "*.exe" `
                -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName | Write-Host
            exit 1
        }
        Write-Host "[OK] signtool : $($signtool.FullName)" -ForegroundColor Green
        Write-Host "[OK] inf2cat  : $($inf2cat.FullName)"  -ForegroundColor Green

name: 'Install Windows Driver Kit (WDK)'
description: >
  Installs Windows SDK 22H2 + WDK 22H2 (10.0.22621.0) for driver builds.
  Both are required: the vcxproj uses WindowsTargetPlatformVersion=10.0.22621.0
  (MSB8036 fires if the Windows SDK is absent) and hardcodes the WDK km path
  C:\Program Files (x86)\Windows Kits\10\Include\10.0.22621.0\km
  Skips each installer if the required artifacts are already present.
  Exit code 1001/3010 from installers is treated as non-fatal.

runs:
  using: composite
  steps:
    - name: Install Windows SDK 22H2 (10.0.22621.0)
      shell: pwsh
      run: |
        # Install the REAL Windows SDK 10.0.22621.0 alongside the existing 10.0.26100.0.
        # Windows SDK versions are side-by-side: each lives under its own versioned subdir
        # in C:\Program Files (x86)\Windows Kits\10\{Include,Lib}\<version>\.
        # Strategy:
        #   1. VS installer component  => real SDK, no version conflict
        #   2. Standalone winsdksetup  => real SDK (for non-VS environments)
        #   3. Directory junctions     => last resort only (clearly labelled as fallback)
        $reqVer  = "10.0.22621.0"
        $base    = "C:\Program Files (x86)\Windows Kits\10"
        $sdkHdr  = "$base\Include\$reqVer\shared\sdkddkver.h"
        $sdkLib  = "$base\Lib\$reqVer\um\x64\gdi32.lib"

        if ((Test-Path $sdkHdr) -and (Test-Path $sdkLib)) {
            Write-Host "[OK] Windows SDK $reqVer already present — skipping" -ForegroundColor Green
            exit 0
        }

        # ── Strategy 1: VS installer (Microsoft.VisualStudio.Component.Windows11SDK.22621) ──
        # VS 2022 maintains a component per SDK version; modify adds it alongside 26100.
        $installer = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
        $vswhere   = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"

        if ((Test-Path $installer) -and (Test-Path $vswhere)) {
            $vsPath = & $vswhere -latest -products * -property installationPath
            if ($vsPath) {
                Write-Host "📦 Installing SDK $reqVer via VS installer (side-by-side)..." -ForegroundColor Cyan
                $proc = Start-Process -FilePath $installer `
                    -ArgumentList "modify --installPath `"$vsPath`" --add Microsoft.VisualStudio.Component.Windows11SDK.22621 --quiet --norestart" `
                    -Wait -PassThru
                Write-Host "[INFO] VS installer exited $($proc.ExitCode)" -ForegroundColor Yellow

                if ((Test-Path $sdkHdr) -and (Test-Path $sdkLib)) {
                    Write-Host "[OK] Windows SDK $reqVer installed via VS component — real SDK present" -ForegroundColor Green
                    exit 0
                }
                Write-Host "[WARN] VS installer ran but SDK $reqVer paths still absent — trying standalone installer" -ForegroundColor Yellow
            }
        } else {
            Write-Host "[INFO] VS installer not found — trying standalone SDK installer" -ForegroundColor Yellow
        }

        # ── Strategy 2: Standalone winsdksetup.exe ──
        # Different exit code semantics than the web installer:
        # 0=success, 3010=reboot, 1001=already at this version (not "newer blocks it").
        Write-Host "📦 Downloading standalone Windows SDK $reqVer..." -ForegroundColor Cyan
        $sdkUrl       = "https://go.microsoft.com/fwlink/?linkid=2196241"
        $sdkInstaller = "$env:TEMP\winsdksetup_22621.exe"
        Invoke-WebRequest -Uri $sdkUrl -OutFile $sdkInstaller -UseBasicParsing

        Write-Host "⚙️  Installing SDK $reqVer (silent)..." -ForegroundColor Cyan
        $sdkLog = "$env:TEMP\winsdksetup_22621.log"
        $proc   = Start-Process -FilePath $sdkInstaller `
            -ArgumentList "/features + /quiet /norestart /log `"$sdkLog`"" `
            -Wait -PassThru

        Write-Host "[INFO] SDK installer exited $($proc.ExitCode)" -ForegroundColor Yellow
        if (Test-Path $sdkLog) {
            Write-Host "--- SDK install log (last 20 lines) ---" -ForegroundColor DarkGray
            Get-Content $sdkLog -Tail 20 | ForEach-Object { Write-Host $_ }
        }

        if ((Test-Path $sdkHdr) -and (Test-Path $sdkLib)) {
            Write-Host "[OK] Windows SDK $reqVer installed via standalone installer — real SDK present" -ForegroundColor Green
            exit 0
        }

        # ── Strategy 3: Directory junctions (LAST RESORT — logged clearly) ──
        # The standalone installer returned a non-success code (possibly 1001 = newer
        # version present prevents installation). junctions alias 22621 paths → 26100.
        # The SDK headers between these versions are binary-compatible for KM driver builds.
        #
        # NOTE: This is a fallback only. If this path executes, it means neither the
        # VS component nor the standalone installer could provide the real SDK 22621.
        # Please investigate the root cause in the CI runner image.
        $existingVer = "10.0.26100.0"
        Write-Host "[FALLBACK] Both real-SDK strategies failed; creating directory junctions $reqVer → $existingVer" -ForegroundColor Magenta
        Write-Host "           Investigate: VS installer may lack Windows11SDK.22621 component on this runner image" -ForegroundColor Magenta

        if (-not (Test-Path "$base\Include\$existingVer\ucrt")) {
            Write-Host "[WARN] Fallback SDK $existingVer not found either; Build-Driver.ps1 will auto-detect" -ForegroundColor Yellow
            exit 0
        }

        function New-Junction([string]$Dst, [string]$Src) {
            if (-not (Test-Path $Src)) { return }
            if (Test-Path $Dst)        { return }
            try {
                New-Item -ItemType Junction -Path $Dst -Target $Src -ErrorAction Stop | Out-Null
                Write-Host "  [J] $Dst -> $Src" -ForegroundColor DarkGray
            } catch {
                Write-Host "  [WARN] Junction failed: $Dst -> $Src : $_" -ForegroundColor Yellow
            }
        }

        New-Item -ItemType Directory -Path "$base\Include\$reqVer" -Force | Out-Null
        foreach ($subdir in @('ucrt','um','shared','winrt','cppwinrt')) {
            New-Junction "$base\Include\$reqVer\$subdir" "$base\Include\$existingVer\$subdir"
        }
        New-Item -ItemType Directory -Path "$base\Lib\$reqVer"      -Force | Out-Null
        New-Item -ItemType Directory -Path "$base\Lib\$reqVer\ucrt" -Force | Out-Null
        New-Item -ItemType Directory -Path "$base\Lib\$reqVer\um"   -Force | Out-Null
        foreach ($arch in @('x64','x86','arm','arm64')) {
            New-Junction "$base\Lib\$reqVer\ucrt\$arch" "$base\Lib\$existingVer\ucrt\$arch"
            New-Junction "$base\Lib\$reqVer\um\$arch"   "$base\Lib\$existingVer\um\$arch"
        }

        if ((Test-Path $sdkHdr) -and (Test-Path $sdkLib)) {
            Write-Host "[FALLBACK-OK] SDK $reqVer directory junctions in place — MSB8036 paths reachable" -ForegroundColor Yellow
        } else {
            Write-Host "[INFO] SDK $reqVer paths still absent; Build-Driver.ps1 auto-detects available SDK" -ForegroundColor Yellow
        }

    - name: Install WDK 22H2 (10.0.22621.0)
      shell: pwsh
      run: |
        function Find-WdkTool([string]$Name) {
            Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter $Name `
                -ErrorAction SilentlyContinue | Select-Object -First 1
        }

        # Check specifically for 10.0.22621.0 headers (the version pinned in vcxproj)
        $requiredKmPath  = "C:\Program Files (x86)\Windows Kits\10\Include\10.0.22621.0\km\ntddk.h"
        $reqVer          = "10.0.22621.0"
        $kitsBase        = "C:\Program Files (x86)\Windows Kits\10"
        $inf2cat         = Find-WdkTool "inf2cat.exe"
        # Prefer signtool from the WDK 22621 bin (not the newer SDK bin)
        $signtool        = Get-ChildItem "$kitsBase\bin\$reqVer" -Recurse -Filter "signtool.exe" `
                               -ErrorAction SilentlyContinue | Select-Object -First 1

        if ($inf2cat -and $signtool -and (Test-Path $requiredKmPath)) {
            Write-Host "[OK] WDK 10.0.22621.0 already present — skipping install" -ForegroundColor Green
            Write-Host "  signtool : $($signtool.FullName)"
            Write-Host "  inf2cat  : $($inf2cat.FullName)"
            exit 0
        }

        # Always install WDK 22H2 (10.0.22621.0) — this is the version pinned in the vcxproj.
        # The vcxproj hardcodes: C:\Program Files (x86)\Windows Kits\10\Include\10.0.22621.0\km
        # Installing a different WDK version will NOT provide that path.
        Write-Host "📦 Downloading WDK 22H2 (10.0.22621.0)..." -ForegroundColor Cyan
        $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2196230"
        $wdkInstaller = "$env:TEMP\wdksetup.exe"
        Invoke-WebRequest -Uri $wdkUrl -OutFile $wdkInstaller -UseBasicParsing

        Write-Host "⚙️ Installing WDK 22H2 (silent)..." -ForegroundColor Cyan
        $wdkLog = "$env:TEMP\wdksetup.log"
        $proc = Start-Process -FilePath $wdkInstaller `
            -ArgumentList "/quiet /norestart /log `"$wdkLog`"" `
            -Wait -PassThru

        # 0    = success
        # 3010 = success, reboot required (safe — tools are usable without reboot)
        # 1001 = installer conflict; tools may already be present
        $acceptableCodes = @(0, 3010, 1001)
        if ($proc.ExitCode -notin $acceptableCodes) {
            Write-Host "[FAIL] WDK installer exited with unexpected code $($proc.ExitCode)" -ForegroundColor Red
            exit $proc.ExitCode
        }
        Write-Host "[INFO] WDK installer exited $($proc.ExitCode) — verifying..." -ForegroundColor Yellow
        if (Test-Path $wdkLog) {
            Write-Host "--- WDK install log (last 20 lines) ---" -ForegroundColor DarkGray
            Get-Content $wdkLog -Tail 20 | ForEach-Object { Write-Host $_ }
        }

        $inf2cat  = Find-WdkTool "inf2cat.exe"

        if (-not (Test-Path $requiredKmPath)) {
            Write-Host "[FAIL] Required WDK headers not found after install: $requiredKmPath" -ForegroundColor Red
            exit 1
        }
        if (-not $inf2cat) {
            Write-Host "[FAIL] inf2cat.exe not found after WDK install" -ForegroundColor Red
            Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "*.exe" `
                -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName | Write-Host
            exit 1
        }
        Write-Host "[OK] inf2cat  : $($inf2cat.FullName)" -ForegroundColor Green

        # WDK does not ship signtool.exe — it lives in the Windows SDK bin dirs.
        # Ensure signtool.exe is present alongside inf2cat in the WDK 10.0.22621.0 bin dirs
        # so both tools report the same version path in the build log.
        $kitsBase = "C:\Program Files (x86)\Windows Kits\10"
        $reqVer   = "10.0.22621.0"
        $sdkVer   = "10.0.26100.0"
        Write-Host "🔗 Ensuring signtool.exe present in WDK $reqVer bin dirs..." -ForegroundColor Cyan
        foreach ($arch in @('x64','x86','arm64','arm')) {
            $wdkBinArch = "$kitsBase\bin\$reqVer\$arch"
            $sdkBinArch = "$kitsBase\bin\$sdkVer\$arch"
            $dstTool    = "$wdkBinArch\signtool.exe"
            $srcTool    = "$sdkBinArch\signtool.exe"
            if (-not (Test-Path $srcTool)) { continue }  # SDK doesn't have this arch
            if (Test-Path $dstTool)        { continue }  # Already present
            if (-not (Test-Path $wdkBinArch)) {
                # WDK didn't create this arch dir at all — junction the whole dir
                New-Item -ItemType Directory -Path (Split-Path $wdkBinArch) -Force | Out-Null
                & cmd /c "mklink /J `"$wdkBinArch`" `"$sdkBinArch`"" | Out-Null
                Write-Host "  [J] bin\$reqVer\$arch -> bin\$sdkVer\$arch" -ForegroundColor DarkGray
            } else {
                # WDK created the dir (has inf2cat etc.) but signtool is missing — hardlink it
                & cmd /c "mklink /H `"$dstTool`" `"$srcTool`"" | Out-Null
                Write-Host "  [H] bin\$reqVer\$arch\signtool.exe <- $sdkVer" -ForegroundColor DarkGray
            }
        }

        # Now locate signtool preferring 10.0.22621.0
        $signtool = Get-ChildItem "$kitsBase\bin\$reqVer" -Recurse -Filter "signtool.exe" `
            -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $signtool) {
            # Fallback: accept any version
            $signtool = Find-WdkTool "signtool.exe"
        }
        if (-not $signtool) {
            Write-Host "[FAIL] signtool.exe not found anywhere under Windows Kits\10\bin" -ForegroundColor Red
            exit 1
        }
        Write-Host "[OK] signtool : $($signtool.FullName)" -ForegroundColor Green

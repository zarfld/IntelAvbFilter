name: "Pillar 1 — CodeQL Driver Analysis (C/C++)"

# CodeQL analysis for the IntelAvbFilter kernel driver C source.
# Uses microsoft/Windows-Driver-Developer-Supplemental-Tools (MSDT) query pack
# which includes NDIS/WDM-specific rules and driver DDI-safety checks on top of
# the standard CodeQL cpp library.
#
# TWO JOBS:
#   analyze       — General-use / CI quality gate.
#                   Uses MSDT @development branch (latest driver queries).
#                   Runs on every push/PR. Fast feedback; NOT valid for WHCP DVL.
#
#   analyze-whcp  — WHCP certification-grade analysis.
#                   Pinned: CodeQL CLI 2.15.4 + MSDT WHCP_22H2 branch +
#                   microsoft/windows-drivers@1.0.13 + microsoft/cpp-queries@0.9.0.
#                   Runs mustfix.qls (blocks cert on violations) AND recommended.qls.
#                   Generates DVL via `msbuild /t:dvl` — artifact uploaded for HLK.
#                   Triggers: workflow_dispatch + push to master/release/*.
#
# References:
#   - TEST-PLAN-NDIS-LWF-COVERAGE.md Pillar 1 (Static Rule Coverage)
#   - https://learn.microsoft.com/windows-hardware/drivers/devtest/static-tools-and-codeql
#   - https://learn.microsoft.com/windows-hardware/drivers/devtest/codeql-queries
#   - https://github.com/microsoft/Windows-Driver-Developer-Supplemental-Tools
#   - WHCP version matrix: CodeQL 2.15.4 + WHCP_22H2 + windows-drivers@1.0.13 + cpp-queries@0.9.0

on:
  push:
    branches: [master, develop, "feature/**", "release/**"]
    paths:
      - "src/**"
      - "include/**"
      - "IntelAvbFilter.vcxproj"
      - "IntelAvbFilter.vcxproj.filters"
      - ".github/workflows/codeql-driver.yml"
  pull_request:
    branches: [master, develop]
    paths:
      - "src/**"
      - "include/**"
      - "IntelAvbFilter.vcxproj"
      - "IntelAvbFilter.vcxproj.filters"
      - ".github/workflows/codeql-driver.yml"
  schedule:
    # Saturday 03:00 UTC — weekly baseline scan
    - cron: "0 3 * * 6"
  workflow_dispatch:

permissions:
  contents: read
  # Required to upload SARIF results to the Security tab
  security-events: write
  # Required to read CodeQL Action status
  actions: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: General-use / CI quality gate.
  # Uses MSDT @development branch (latest driver queries, bundled CodeQL version).
  # Results surfaced in GitHub Security tab for PR feedback.
  # ⚠ NOT valid for WHCP DVL generation — see analyze-whcp job below.
  # ─────────────────────────────────────────────────────────────────────────────
  analyze:
    name: CodeQL — C/C++ Driver Analysis (MSDT dev-branch, CI quality gate)
    runs-on: windows-2022

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up MSVC environment (x64)
        # Required so MSBuild and cl.exe are on PATH for the CodeQL build tracer.
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Windows Driver Kit (WDK)
        # Installs SDK 10.0.22621.0 + WDK 10.0.22621.0 side-by-side.
        # The vcxproj uses WindowsTargetPlatformVersion=10.0.22621.0; without the
        # matching SDK/WDK headers the build tracer fails to capture the compilation.
        uses: ./.github/actions/install-wdk

      - name: Initialize CodeQL (MSDT driver config — development branch)
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
          # MSDT config enables Windows Driver DDI-safety queries + NDIS rules on
          # top of the standard cpp library queries.
          # NOTE: @development = general-use, NOT a WHCP-certified branch.
          # For WHCP-grade analysis use the analyze-whcp job below.
          config-file: microsoft/Windows-Driver-Developer-Supplemental-Tools/config/codeql-config.yml@development

      - name: Build driver for CodeQL tracing (Release|x64)
        shell: pwsh
        run: |
          # Build the driver so the CodeQL tracer can capture all compilation units.
          # TreatWarningAsError=false: analysis warnings must not abort the build.
          # RunCodeAnalysis=false: keep PREfast separate (static-analysis-prefast job).
          Write-Host "=== CodeQL build trace: IntelAvbFilter Release|x64 ===" -ForegroundColor Cyan
          msbuild IntelAvbFilter.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:TreatWarningAsError=false `
            /p:RunCodeAnalysis=false `
            /p:AvbVersionBuild=0 `
            /p:AvbVersionRevision=0 `
            /t:Rebuild
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Build failed (exit $LASTEXITCODE) — CodeQL analysis aborted" -ForegroundColor Red
            exit $LASTEXITCODE
          }
          Write-Host "Build succeeded — CodeQL tracer captured compilation units" -ForegroundColor Green

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"
          # Output SARIF alongside driver binary in the build tree for local inspection.
          output: build/codeql-results
          upload: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: WHCP certification-grade CodeQL analysis.
  #
  # Pinned per WHCP version matrix (Win11 22H2 / WHCP_22H2):
  #   CodeQL CLI:              2.15.4
  #   MSDT branch:             WHCP_22H2
  #   microsoft/windows-drivers pack: 1.0.13
  #   microsoft/cpp-queries pack:     0.9.0
  #
  # Query suites run explicitly (pack 1.0.13 uses legacy underscore naming under suites/):
  #   suites/windows_driver_recommended.qls  — full set (superset of mustrun + mustfix)
  #   suites/windows_driver_mustfix.qls      — subset; violations BLOCK WHCP cert; exit non-zero on findings
  #
  # After analysis: generates Driver Verification Log (DVL) via MSBuild /t:dvl.
  # DVL is required for HLK Static Tools Logo test (WHCP certification).
  # DVL artifact uploaded for manual commit to test-evidence/ before release.
  #
  # Trigger: workflow_dispatch (manual) + push to master/release/* (not PRs).
  # ─────────────────────────────────────────────────────────────────────────────
  analyze-whcp:
    name: CodeQL — WHCP Certification Analysis (pinned CLI 2.15.4 + WHCP_22H2 + DVL)
    runs-on: windows-2022
    # Only run on master/release pushes and manual triggers — not on every PR
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/')))

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up MSVC environment (x64)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Windows Driver Kit (WDK 22H2)
        uses: ./.github/actions/install-wdk

      - name: Install CodeQL CLI 2.15.4 (WHCP_22H2 required version)
        id: codeql-install
        shell: pwsh
        run: |
          # WHCP_22H2 requires exactly CodeQL CLI 2.15.4 (VS 17.8+ path).
          # Ref: https://learn.microsoft.com/windows-hardware/drivers/devtest/static-tools-and-codeql
          $Version  = "2.15.4"
          $ZipUrl   = "https://github.com/github/codeql-cli-binaries/releases/download/v$Version/codeql-win64.zip"
          $ZipPath  = "$env:RUNNER_TEMP\codeql-$Version.zip"
          $ExtractTo = "C:\codeql-$Version"

          Write-Host "Downloading CodeQL CLI $Version from $ZipUrl" -ForegroundColor Cyan
          Invoke-WebRequest -Uri $ZipUrl -OutFile $ZipPath -UseBasicParsing
          Expand-Archive -Path $ZipPath -DestinationPath $ExtractTo -Force

          $codeqlExe = "$ExtractTo\codeql\codeql.exe"
          if (-not (Test-Path $codeqlExe)) {
            Write-Error "CodeQL CLI not found at expected path: $codeqlExe"
            exit 1
          }
          Write-Host "CodeQL CLI installed: $codeqlExe" -ForegroundColor Green
          & $codeqlExe version
          "CODEQL_EXE=$codeqlExe" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Clone MSDT WHCP_22H2 (query suites + dependencies)
        shell: pwsh
        run: |
          # Pack microsoft/windows-drivers@1.0.13 was published WITHOUT .qls suite files.
          # The suite files (windows_driver_recommended.qls, windows_driver_mustfix.qls)
          # only exist in the MSDT source repository at:
          #   codeql/windows-drivers/queries/suites/
          # Per MSDT README and MSDT CI (build-codeql.yaml), the supported approach
          # for CLI 2.15.4 + VS17.8+ is to clone the WHCP_22H2 branch and use
          # local paths to the .qls files.
          $MsdtPath = "$env:RUNNER_TEMP\msdt-whcp"
          Write-Host "Cloning MSDT WHCP_22H2 (--depth 1, no submodules) ..." -ForegroundColor Cyan
          git clone https://github.com/microsoft/Windows-Driver-Developer-Supplemental-Tools.git `
            --branch WHCP_22H2 --depth 1 --no-recurse-submodules `
            $MsdtPath
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $PackDir  = "$MsdtPath\codeql\windows-drivers\queries"
          $SuiteDir = "$PackDir\suites"

          Write-Host "=== Suite files in WHCP_22H2 clone ===" -ForegroundColor Green
          Get-ChildItem -Path $SuiteDir -Filter "*.qls" | Sort-Object Name |
            ForEach-Object { Write-Host "  $($_.Name)" }

          # ----- Resolve codeql/cpp-all at a version compatible with CLI 2.15.4 -----
          # Problem: WHCP_22H2 qlpack.yml declares codeql/cpp-all: "*".
          #   codeql pack install resolves "*" from the registry and downloads the LATEST,
          #   which is cpp-all@8.0.3 (requires CLI 2.17+ extensible predicates).
          # Fix strategy:
          #   1. Download codeql/cpp-queries@0.9.0 FIRST — per MSDT CLI-2.15.4 matrix.
          #      codeql/cpp-queries@0.9.0 depends on a compatible (pre-8.0) cpp-all and
          #      installs it into the global packages cache (~/.codeql/packages/codeql/cpp-all/).
          #   2. Detect the version that landed in the cache.
          #   3. Patch qlpack.yml to pin codeql/cpp-all to that exact version string
          #      (CodeQL qlpack only accepts "*" or an exact version — NOT range operators).
          #   4. Run codeql pack install — now uses the pinned (compatible) version.

          Write-Host "Downloading codeql/cpp-queries@0.9.0 (MSDT CLI 2.15.4 matrix) ..." -ForegroundColor Cyan
          & "$env:CODEQL_EXE" pack download codeql/cpp-queries@0.9.0
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Detect which codeql/cpp-all version the above download installed.
          # codeql pack download installs transitive dependencies to the global pack cache.
          $PacksRoot   = "$env:USERPROFILE\.codeql\packages"
          $CppAllCache = "$PacksRoot\codeql\cpp-all"
          $CppAllVersion = $null

          # Primary: global packages cache (~/.codeql/packages/codeql/cpp-all/<version>/)
          if (Test-Path $CppAllCache) {
            $CppAllVersion = (Get-ChildItem $CppAllCache -Directory |
              Where-Object { $_.Name -match '^\d' } |
              Sort-Object Name | Select-Object -Last 1).Name
          }
          # Fallback: bundled inside the cpp-queries pack itself
          if (-not $CppAllVersion) {
            $Bundled = "$PacksRoot\codeql\cpp-queries\0.9.0\.codeql\libraries\codeql\cpp-all"
            if (Test-Path $Bundled) {
              $CppAllVersion = (Get-ChildItem $Bundled -Directory |
                Sort-Object Name | Select-Object -Last 1).Name
            }
          }

          if (-not $CppAllVersion) {
            Write-Error "FAIL: could not detect codeql/cpp-all version installed by cpp-queries@0.9.0"
            exit 1
          }
          Write-Host "Detected compatible codeql/cpp-all version: $CppAllVersion" -ForegroundColor Green

          # Patch qlpack.yml: replace wildcard with the exact detected version.
          # IMPORTANT: CodeQL qlpack only accepts "*" or exact SemVer strings — NOT range operators.
          $QlpackFile = "$PackDir\qlpack.yml"
          $qlpackContent = Get-Content $QlpackFile -Raw
          $qlpackContent = $qlpackContent.Replace('codeql/cpp-all: "*"', "codeql/cpp-all: `"$CppAllVersion`"")
          Set-Content $QlpackFile -Value $qlpackContent -NoNewline
          Write-Host "Patched qlpack.yml (codeql/cpp-all pinned to $CppAllVersion):" -ForegroundColor DarkCyan
          Get-Content $QlpackFile | Write-Host

          # Install remaining pack dependencies (codeql/cpp-all is already downloaded).
          Write-Host "Installing query pack dependencies (qlpack.yml) ..." -ForegroundColor Cyan
          & "$env:CODEQL_EXE" pack install $PackDir
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          "WHCP_SUITE_DIR=$SuiteDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "WHCP_SUITE_DIR=$SuiteDir" -ForegroundColor Green

      - name: Verify WHCP suite files exist
        shell: pwsh
        run: |
          # Confirm the two required .qls files were cloned successfully.
          $Recommended = "$env:WHCP_SUITE_DIR\windows_driver_recommended.qls"
          $Mustfix     = "$env:WHCP_SUITE_DIR\windows_driver_mustfix.qls"
          foreach ($f in @($Recommended, $Mustfix)) {
            if (Test-Path $f) {
              Write-Host "[OK] $f" -ForegroundColor Green
            } else {
              Write-Error "[MISSING] $f — clone may have failed"
              exit 1
            }
          }

      - name: Create CodeQL database (WHCP build trace)
        shell: pwsh
        run: |
          $DbPath = "$env:RUNNER_TEMP\codeql-db-whcp"
          Write-Host "=== Creating CodeQL database: $DbPath ===" -ForegroundColor Cyan
          & "$env:CODEQL_EXE" database create $DbPath `
            --language=cpp `
            --source-root=. `
            --command="msbuild IntelAvbFilter.vcxproj /p:Configuration=Release /p:Platform=x64 /p:TreatWarningAsError=false /p:RunCodeAnalysis=false /p:AvbVersionBuild=0 /p:AvbVersionRevision=0 /t:Rebuild" `
            --overwrite
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          "CODEQL_DB=$DbPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Database created successfully" -ForegroundColor Green

      - name: Run windows_driver_recommended.qls (full WHCP suite)
        shell: pwsh
        run: |
          # Use the local .qls path from the MSDT WHCP_22H2 clone.
          # Pack 1.0.13 distribution lacks .qls files; local clone is required.
          # Path confirmed from MSDT build-codeql.yaml CI:
          #   codeql/windows-drivers/queries/suites/windows_driver_recommended.qls
          New-Item -ItemType Directory -Force -Path build/codeql-whcp | Out-Null
          $Suite = "$env:WHCP_SUITE_DIR\windows_driver_recommended.qls"
          Write-Host "=== Running windows_driver_recommended.qls (WHCP_22H2, local clone) ===" -ForegroundColor Cyan
          Write-Host "Suite: $Suite"
          & "$env:CODEQL_EXE" database analyze "$env:CODEQL_DB" `
            $Suite `
            --format=sarifv2.1.0 `
            --output=build/codeql-whcp/IntelAvbFilter-recommended.sarif `
            --threads=0
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "windows_driver_recommended.qls analysis complete" -ForegroundColor Green

      - name: Check mustfix violations (blocks WHCP certification)
        shell: pwsh
        run: |
          # windows_driver_mustfix.qls = subset of recommended; violations BLOCK WHCP cert.
          # Use the local .qls path from the MSDT WHCP_22H2 clone.
          $Suite = "$env:WHCP_SUITE_DIR\windows_driver_mustfix.qls"
          Write-Host "=== Running windows_driver_mustfix.qls (WHCP blocking checks, local clone) ===" -ForegroundColor Cyan
          Write-Host "Suite: $Suite"
          & "$env:CODEQL_EXE" database analyze "$env:CODEQL_DB" `
            $Suite `
            --format=sarifv2.1.0 `
            --output=build/codeql-whcp/IntelAvbFilter-mustfix.sarif `
            --threads=0
          if ($LASTEXITCODE -ne 0) {
            Write-Host "windows_driver_mustfix.qls violations found — driver CANNOT pass WHCP certification" -ForegroundColor Red
            exit $LASTEXITCODE
          }
          Write-Host "windows_driver_mustfix.qls: no violations — WHCP blocking checks passed" -ForegroundColor Green

      - name: Generate Driver Verification Log (DVL)
        shell: pwsh
        run: |
          # DVL is required for the HLK Static Tools Logo test (WHCP certification).
          # MSBuild /t:dvl looks for <DriverName>.sarif in the project directory.
          # Copy the WHCP-grade SARIF there before invoking the DVL target.
          Write-Host "=== Generating DVL from WHCP-grade SARIF ===" -ForegroundColor Cyan
          Copy-Item build/codeql-whcp/IntelAvbFilter-recommended.sarif IntelAvbFilter.sarif -Force

          msbuild IntelAvbFilter.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /t:dvl
          if ($LASTEXITCODE -ne 0) {
            Write-Host "DVL generation failed (exit $LASTEXITCODE)" -ForegroundColor Red
            exit $LASTEXITCODE
          }

          # DVL is placed in the project directory by the WDK target.
          $DvlFile = Get-ChildItem -Filter "*.DVL.XML" | Select-Object -First 1
          if (-not $DvlFile) {
            Write-Error "DVL file not found after msbuild /t:dvl"
            exit 1
          }
          Write-Host "DVL generated: $($DvlFile.FullName)" -ForegroundColor Green

          # Stamp build number into filename and copy to output dir.
          $BuildNum = (Get-Content build_number.txt -ErrorAction SilentlyContinue) ?? "0"
          $Dated = "IntelAvbFilter-WHCP22H2-$(Get-Date -Format yyyyMMdd)-build$BuildNum.DVL.XML"
          Copy-Item $DvlFile.FullName "build/codeql-whcp/$Dated"
          Copy-Item $DvlFile.FullName "build/codeql-whcp/IntelAvbFilter-latest.DVL.XML"
          "DVL_FILE=build/codeql-whcp/$Dated" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload WHCP artifacts (SARIF + DVL)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: whcp-codeql-artifacts-${{ github.run_number }}
          path: |
            build/codeql-whcp/*.sarif
            build/codeql-whcp/*.DVL.XML
          retention-days: 90

      - name: Upload WHCP SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: build/codeql-whcp/IntelAvbFilter-recommended.sarif
          category: "/language:c-cpp/whcp"

      - name: DVL commit reminder
        if: success()
        shell: pwsh
        run: |
          Write-Host "" -ForegroundColor White
          Write-Host "╔══════════════════════════════════════════════════════════════╗" -ForegroundColor Yellow
          Write-Host "║  DVL GENERATED — ACTION REQUIRED FOR WHCP CERTIFICATION      ║" -ForegroundColor Yellow
          Write-Host "╠══════════════════════════════════════════════════════════════╣" -ForegroundColor Yellow
          Write-Host "║  Download artifact: whcp-codeql-artifacts-${{ github.run_number }}      ║" -ForegroundColor Yellow
          Write-Host "║  Commit DVL to:     test-evidence/dvl-YYYYMMDD.DVL.XML       ║" -ForegroundColor Yellow
          Write-Host "║  Include in HLK package for Static Tools Logo test.          ║" -ForegroundColor Yellow
          Write-Host "║  See: TEST-PLAN-NDIS-LWF-COVERAGE.md Pillar 1               ║" -ForegroundColor Yellow
          Write-Host "╚══════════════════════════════════════════════════════════════╝" -ForegroundColor Yellow
